server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/leave_management
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration